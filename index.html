<script>
  // These pull the keys you saved in Vercel Settings
  const ethKey = VK3UV7J9MHTQE5A3EWTJDAXA1E182R2S9D; 
  const solKey = bb6fef44-5a36-42dc-ab51-9388651fa785;

  async function runScan() {
    const addr = document.getElementById('inp').value.trim();
    const out = document.getElementById('out');
    if(!addr) return;

    out.classList.remove('hidden');
    out.innerHTML = `<p class="text-blue-400 text-xs font-bold animate-pulse">QUERYING CHAIN DATA...</p>`;

    try {
      if (addr.startsWith('0x')) {
        // ETH Logic: Get First Tx
        const resp = await fetch(`https://api.etherscan.io/api?module=account&action=txlist&address=${addr}&startblock=0&endblock=99999999&page=1&offset=1&sort=asc&apikey=${ethKey}`);
        const data = await resp.json();
        const firstTx = data.result[0];
        
        // Calculate Age
        const birthDate = new Date(firstTx.timeStamp * 1000);
        const ageYears = ((new Date() - birthDate) / (1000 * 60 * 60 * 24 * 365)).toFixed(1);
        const rank = ageYears > 4 ? "ANCIENT OG" : "VETERAN";

        out.innerHTML = `
          <div class="text-2xl font-bold text-white mb-4">ETHEREUM</div>
          <div class="grid grid-cols-2 gap-4">
            <div class="bg-white/5 p-3 rounded">
              <div class="text-[10px] text-gray-500 uppercase">Rank</div>
              <div class="font-bold text-blue-400">${rank}</div>
            </div>
            <div class="bg-white/5 p-3 rounded">
              <div class="text-[10px] text-gray-500 uppercase">Wallet Age</div>
              <div class="font-bold">${ageYears} YRS</div>
            </div>
          </div>
        `;
      } else {
        // SOL Logic: Use Helius
        out.innerHTML = `<div class="text-purple-400">Solana Scanning coming in next commit...</div>`;
      }
    } catch (e) {
      out.innerHTML = `<div class="text-red-500 text-xs">SCAN FAILED: CHECK API KEYS</div>`;
    }
  }
</script>
