<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>NewmannScan</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #04050d;
      --text: #e8eaf6;
      --card: #0a0b15;
      --border: #1a1d30;
      --accent: #3b82f6;
      --accent-dim: rgba(59,130,246,0.12);
      --muted: #3f4361;
    }
    html.light {
      --bg: #f0f2ff;
      --text: #0a0b15;
      --card: #ffffff;
      --border: #dde0f0;
      --accent: #2563eb;
      --accent-dim: rgba(37,99,235,0.08);
      --muted: #8890b5;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    body::before {
      content: '';
      position: fixed;
      top: -20vh;
      left: 50%;
      transform: translateX(-50%);
      width: 80vw;
      height: 50vh;
      background: radial-gradient(ellipse, rgba(59,130,246,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 440px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem;
      padding-bottom: calc(2rem + env(safe-area-inset-bottom));
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .logo-mark {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 0.6rem;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      color: #fff;
      box-shadow: 0 0 18px rgba(59,130,246,0.35);
      flex-shrink: 0;
    }
    .logo-text {
      font-weight: 700;
      font-size: 0.875rem;
      letter-spacing: 0.05em;
    }
    .theme-btn {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
    .theme-btn:active { transform: scale(0.88); }

    .hero {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .hero h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 18vw, 4.5rem);
      letter-spacing: 0.04em;
      line-height: 0.92;
      color: var(--text);
    }
    .hero .sub {
      margin-top: 0.75rem;
      font-size: 0.6rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
    }
    .input-card {
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .addr-field {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 0.875rem 1rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--text);
      outline: none;
      margin-bottom: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .addr-field::placeholder { color: var(--muted); }
    .addr-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .scan-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 0.875rem;
      padding: 1rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.15rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: background 0.2s, transform 0.12s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 20px rgba(59,130,246,0.25);
      display: block;
    }
    .scan-btn:active { transform: scale(0.97); box-shadow: none; }
    .scan-btn:disabled { opacity: 0.5; pointer-events: none; }

    .result-card {
      padding: 1.5rem 1.25rem;
      border-top: 3px solid var(--accent);
    }
    .result-card.hidden { display: none; }

    .chain-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent-dim);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.875rem;
    }
    .chain-dot {
      width: 0.45rem;
      height: 0.45rem;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.65); }
    }

    .identity {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
      word-break: break-all;
    }
    .tier-badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 14vw, 3.2rem);
      letter-spacing: 0.06em;
      line-height: 1;
      margin-bottom: 1.25rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.625rem;
    }
    .stat-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 0.875rem 1rem;
    }
    .stat-label {
      font-size: 0.55rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .stat-value {
      font-size: 0.9rem;
      font-weight: 700;
    }

    .scanning-msg {
      text-align: center;
      padding: 2rem 0;
      color: var(--accent);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      animation: breathe 1.4s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .error-msg { text-align: center; padding: 1.5rem 0; }
    .error-title {
      color: #f87171;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .error-detail {
      color: var(--muted);
      font-size: 0.6rem;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="header-left">
        <div class="logo-mark">N</div>
        <span class="logo-text">NewmannScan</span>
      </div>
      <button onclick="toggleTheme()" id="themeBtn" class="theme-btn">🌙</button>
    </header>

    <div class="hero">
      <h2>Wallet<br>Heritage</h2>
      <p class="sub">Multi-Chain Reputation</p>
    </div>

    <div class="card input-card">
      <input id="addrInp" type="text" placeholder="Paste ETH or SOL address…"
             class="addr-field" autocomplete="off" autocorrect="off"
             autocapitalize="none" spellcheck="false">
      <button id="scanBtn" onclick="runScan()" class="scan-btn">
        Analyze Reputation
      </button>
    </div>

    <div id="resultArea" class="card result-card hidden"></div>
  </div>

  <script>
    var ETH_KEY = "VK3UV7J9MHTQE5A3EWTJDAXA1E182R2S9D";
    var SOL_KEY = "bb6fef44-5a36-42dc-ab51-9388651fa785";

    function toggleTheme() {
      var html = document.documentElement;
      var btn  = document.getElementById('themeBtn');
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        html.classList.add('light');
        btn.textContent = '☀️';
      } else {
        html.classList.remove('light');
        html.classList.add('dark');
        btn.textContent = '🌙';
      }
    }

    async function runScan() {
      var addr = document.getElementById('addrInp').value.trim();
      var area = document.getElementById('resultArea');
      var btn  = document.getElementById('scanBtn');
      if (!addr) return;

      btn.disabled = true;
      area.classList.remove('hidden');
      area.innerHTML = '<div class="scanning-msg">Scanning Ledger\u2026</div>';

      try {
        if (addr.startsWith('0x')) {
          await scanEthereum(addr, area);
        } else {
          await scanSolana(addr, area);
        }
      } catch (err) {
        area.innerHTML = '<div class="error-msg"><div class="error-title">Scan Error</div><div class="error-detail">' + (err.message || 'Request failed') + '</div></div>';
      } finally {
        btn.disabled = false;
      }
    }

    async function scanEthereum(addr, area) {
      var identity = addr.substring(0, 6) + '\u2026' + addr.substring(38);

      try {
        var ensRes  = await fetch('https://api.ensideas.com/ens/resolve/' + addr);
        var ensData = await ensRes.json();
        if (ensData && ensData.displayName) identity = ensData.displayName;
      } catch(e) {}

      var ethUrl = 'https://api.etherscan.io/api?module=account&action=txlist&address='
                  + addr + '&sort=asc&apikey=' + ETH_KEY;
      var apiUrl = 'https://corsproxy.io/?' + encodeURIComponent(ethUrl);
      var res  = await fetch(apiUrl);
      var data = await res.json();

      if (data.status === '1' && data.result && data.result.length > 0) {
        var firstTs = parseInt(data.result[0].timeStamp, 10) * 1000;
        var age = ((Date.now() - firstTs) / 31536000000).toFixed(1);
        var gas = 0;
        data.result.slice(0, 100).forEach(function(tx) {
          gas += (parseFloat(tx.gasUsed) * parseFloat(tx.gasPrice) / 1e18);
        });
        var tier = gas > 1 ? 'WHALE' : gas > 0.1 ? 'SHARK' : parseFloat(age) > 3.5 ? 'OG' : 'SHRIMP';
        render(area, 'ETHEREUM', identity, tier, age + ' yrs', gas.toFixed(4) + ' ETH');
      } else {
        render(area, 'ETHEREUM', identity, 'NEWBORN', '0.0 yrs', '0.0000 ETH');
      }
    }

    async function scanSolana(addr, area) {
      var url = 'https://mainnet.helius-rpc.com/?api-key=' + SOL_KEY;
      var res  = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          jsonrpc: '2.0', id: '1',
          method: 'getSignaturesForAddress',
          params: [addr, { limit: 1 }]
        })
      });
      var data = await res.json();
      var short = addr.substring(0, 4) + '\u2026' + addr.slice(-4);

      if (data.result && data.result.length > 0) {
        render(area, 'SOLANA', short, 'SURVIVOR', 'Active', 'SVM Live');
      } else {
        render(area, 'SOLANA', short, 'NEWBORN', '\u2014', '0.00 SOL');
      }
    }

    function render(el, chain, identity, tier, age, gas) {
      el.innerHTML =
        '<div class="chain-pill"><span class="chain-dot"></span>' + chain + '</div>' +
        '<div class="identity">' + identity + '</div>' +
        '<div class="tier-badge">' + tier + '</div>' +
        '<div class="stats-grid">' +
          '<div class="stat-box"><div class="stat-label">Wallet Age</div><div class="stat-value">' + age + '</div></div>' +
          '<div class="stat-box"><div class="stat-label">Gas Spent</div><div class="stat-value">' + gas + '</div></div>' +
        '</div>';
    }
  </script>
</body>
  </html>
