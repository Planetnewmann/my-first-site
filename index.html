<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewmannScan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    body { background-color: #070810; color: #f8fafc; font-family: sans-serif; }
    .glass { background: #0f1018; border: 1px solid #1c1d2a; border-radius: 1rem; }
  </style>
</head>
<body class="p-6">
  <div class="max-w-md mx-auto">
    <header class="flex justify-between items-center mb-10">
      <h1 class="font-bold text-xl text-blue-500">NewmannScan</h1>
      <button onclick="document.documentElement.classList.toggle('dark')" class="p-2">🌓</button>
    </header>

    <div class="text-center mb-8">
      <h2 class="text-4xl font-black tracking-tighter text-white uppercase">Wallet Heritage</h2>
      <p class="text-gray-500 text-xs mt-2">Drosera Community Ambassador</p>
    </div>

    <div class="glass p-4 mb-6">
      <input id="inp" type="text" placeholder="Paste address..." class="w-full bg-transparent border-none outline-none text-sm font-mono mb-4">
      <button onclick="runScan()" class="w-full bg-blue-600 py-3 rounded-lg font-bold">SCAN ADDRESS</button>
    </div>

    <div id="out" class="hidden glass p-6 animate-pulse">
      <p class="text-blue-400 text-xs font-bold mb-2">SCANNING BLOCKCHAIN...</p>
    </div>
  </div>

  <script>
    function runScan() {
      const addr = document.getElementById('inp').value;
      const out = document.getElementById('out');
      if(!addr) return;
      out.classList.remove('hidden');
      setTimeout(() => {
        out.classList.remove('animate-pulse');
        out.innerHTML = `
          <div class="text-xs text-gray-500 mb-1">NETWORK DETECTED</div>
          <div class="text-2xl font-bold text-white mb-4">${addr.startsWith('0x') ? 'ETHEREUM' : 'SOLANA'}</div>
          <div class="grid grid-cols-2 gap-4">
            <div class="bg-white/5 p-3 rounded">
              <div class="text-[10px] text-gray-500">RANK</div>
              <div class="font-bold">OG SHARK</div>
            </div>
            <div class="bg-white/5 p-3 rounded">
              <div class="text-[10px] text-gray-500">AGE</div>
              <div class="font-bold">3.8 YRS</div>
            </div>
          </div>
        `;
      }, 1500);
    }
  </script>
</body>
</html>
