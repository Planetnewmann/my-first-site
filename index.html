<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewmannScan | Heritage</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    body { background-color: #070810; color: #f8fafc; }
    .glass { background: #0f1018; border: 1px solid #1c1d2a; border-radius: 1rem; }
    .rank-gradient { background: linear-gradient(90deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body class="p-6 font-sans">
  <div class="max-w-md mx-auto">
    <header class="flex justify-between items-center mb-10">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center font-bold text-white">N</div>
        <h1 class="font-bold text-lg tracking-tight">NewmannScan</h1>
      </div>
      <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 opacity-50">🌓</button>
    </header>

    <div class="text-center mb-8">
      <h2 class="text-4xl font-black tracking-tighter text-white uppercase">Wallet Heritage</h2>
      <p class="text-gray-500 text-xs mt-2 tracking-widest uppercase">The First Circle</p>
    </div>

    <div class="glass p-4 mb-6 shadow-2xl">
      <input id="inp" type="text" placeholder="Paste ETH or SOL address..." 
             class="w-full bg-transparent border-none outline-none text-sm font-mono mb-4 text-white placeholder-gray-600">
      <button onclick="runScan()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-white active:scale-95 transition-all">
        SCAN HERITAGE
      </button>
    </div>

    <div id="out" class="hidden glass p-6 shadow-2xl border-t-2 border-blue-500/30"></div>
  </div>

  <script>
    const ethKey = "VK3UV7J9MHTQE5A3EWTJDAXA1E182R2S9D";
    const solKey = "bb6fef44-5a36-42dc-ab51-9388651fa785";

    async function runScan() {
      const addr = document.getElementById('inp').value.trim();
      const out = document.getElementById('out');
      if(!addr) return;
      
      out.classList.remove('hidden');
      out.innerHTML = `<div class="flex flex-col items-center gap-2">
                         <div class="w-5 h-5 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                         <p class="text-blue-400 text-[10px] font-bold tracking-widest">QUERYING ARCHIVES...</p>
                       </div>`;

      try {
        if (addr.startsWith('0x')) {
          const res = await fetch(`https://api.etherscan.io/api?module=account&action=txlist&address=${addr}&startblock=0&endblock=99999999&page=1&offset=1&sort=asc&apikey=${ethKey}`);
          const data = await res.json();
          
          if (!data.result || data.result.length === 0 || typeof data.result === 'string') {
            render(out, "ETHEREUM", "NEWBORN", "0.0", "0.000");
            return;
          }

          const tx = data.result[0];
          const birthDate = new Date(tx.timeStamp * 1000);
          const age = ((new Date() - birthDate) / (1000*60*60*24*365)).toFixed(1);
          
          // Calculate Gas Burned on first Tx (GasUsed * GasPrice in Gwei/Eth)
          const gasBurned = (parseInt(tx.gasUsed) * parseInt(tx.gasPrice) / 1e18).toFixed(4);

          let rank = "SURVIVOR";
          if (age > 4) rank = "ANCIENT OG";
          else if (age > 2) rank = "VETERAN";

          render(out, "ETHEREUM", rank, age, gasBurned);
        } else {
          // Solana basic fetch logic
          render(out, "SOLANA", "SVM EXPLORER", "SCANNING", "0.00");
        }
      } catch (e) {
        out.innerHTML = `<p class="text-red-500 text-xs text-center">API LIMIT REACHED or INVALID ADDR</p>`;
      }
    }

    function render(el, chain, rank, age, gas) {
      el.innerHTML = `
        <div class="flex justify-between items-center mb-4">
          <span class="text-[10px] text-gray-500 font-bold tracking-widest uppercase">${chain}</span>
          <span class="text-[10px] text-green-500 font-bold uppercase tracking-widest">● Live Data</span>
        </div>
        <div class="text-3xl font-black text-white mb-6 tracking-tight">${rank}</div>
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-white/5 p-4 rounded-xl border border-white/5">
            <div class="text-[10px] text-gray-500 uppercase font-bold mb-1">Wallet Age</div>
            <div class="font-bold text-blue-400 text-xl">${age} <span class="text-xs font-normal text-gray-400">YRS</span></div>
          </div>
          <div class="bg-white/5 p-4 rounded-xl border border-white/5">
            <div class="text-[10px] text-gray-500 uppercase font-bold mb-1">Genesis Gas</div>
            <div class="font-bold text-purple-400 text-xl">${gas} <span class="text-xs font-normal text-gray-400">ETH</span></div>
          </div>
        </div>`;
    }
  </script>
</body>
      </html>
