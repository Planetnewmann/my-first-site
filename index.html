<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewmannScan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        :root { --bg: #070810; --text: #f8fafc; --card: #0f1018; }
        html.light { --bg: #f8fafc; --text: #0f172a; --card: #ffffff; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; }
        .glass { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; }
    </style>
</head>
<body class="p-6">
    <div class="flex justify-between items-center max-w-md mx-auto mb-10">
        <span class="font-bold text-blue-500">NewmannScan</span>
        <button onclick="document.documentElement.classList.toggle('light')" class="text-xl">🌓</button>
    </div>

    <div class="max-w-md mx-auto text-center">
        <h1 class="text-4xl font-black uppercase italic mb-8">Wallet Heritage</h1>
        <div class="glass p-5 mb-6">
            <input id="addr" type="text" placeholder="Paste 0x address" class="w-full bg-transparent outline-none mb-4 text-sm font-mono text-center">
            <button onclick="scan()" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-white hover:bg-blue-500 transition-colors">ANALYZE REPUTATION</button>
        </div>
        <div id="out" class="hidden glass p-6 border-t-4 border-blue-600"></div>
    </div>

    <script>
        // HARDCODED KEYS - ESSENTIAL FOR FRONTEND DEPLOYMENT
        const ETH_KEY = "VK3UV7J9MHTQE5A3EWTJDAXA1E182R2S9D";

        async function scan() {
            const input = document.getElementById('addr').value.trim();
            const output = document.getElementById('out');
            if(!input.startsWith('0x')) return alert("Invalid ETH Address");

            output.classList.remove('hidden');
            output.innerHTML = "<p class='animate-pulse text-blue-400'>SCANNING CHAIN...</p>";

            try {
                const response = await fetch(`https://api.etherscan.io/api?module=account&action=txlist&address=${input}&sort=asc&apikey=${ETH_KEY}`);
                const data = await response.json();
                
                if(data.status === "1") {
                    const firstTx = data.result[0];
                    const age = ((new Date() - new Date(firstTx.timeStamp * 1000)) / 31536000000).toFixed(1);
                    
                    let gas = 0;
                    // Analyze last 100 tx for reputation
                    data.result.slice(0, 100).forEach(tx => {
                        gas += (tx.gasUsed * tx.gasPrice / 1e18);
                    });

                    // THE SERIOUS TIER LOGIC
                    let tier = "SHRIMP";
                    if (gas > 1) tier = "WHALE";
                    else if (gas > 0.1) tier = "SHARK";
                    else if (age > 3.5) tier = "OG SURVIVOR";

                    output.innerHTML = `
                        <div class="text-5xl font-black italic mb-4 text-white">${tier}</div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-blue-500/5 p-4 rounded-xl border border-blue-500/10">
                                <div class="text-[10px] opacity-40 uppercase font-bold">Age</div>
                                <div class="text-xl font-bold">${age} YRS</div>
                            </div>
                            <div class="bg-indigo-500/5 p-4 rounded-xl border border-indigo-500/10">
                                <div class="text-[10px] opacity-40 uppercase font-bold">Gas</div>
                                <div class="text-xl font-bold text-blue-400">${gas.toFixed(3)} ETH</div>
                            </div>
                        </div>`;
                } else {
                    output.innerHTML = "No transactions found.";
                }
            } catch(e) {
                output.innerHTML = "Error: Check connection or API key.";
            }
        }
    </script>
</body>
</html>
