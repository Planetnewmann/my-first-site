<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>NewmannScan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    :root { --bg: #070810; --text: #f8fafc; --card: #0f1018; --border: #1c1d2a; }
    html.light { --bg: #f8fafc; --text: #0f172a; --card: #ffffff; --border: #e2e8f0; }
    body { background-color: var(--bg); color: var(--text); transition: 0.3s; font-family: sans-serif; -webkit-font-smoothing: antialiased; }
    .glass { background: var(--card); border: 1px solid var(--border); border-radius: 1.25rem; }
  </style>
</head>
<body class="p-6 min-h-screen">
  <div class="max-w-md mx-auto">
    <header class="flex justify-between items-center mb-10">
      <div class="flex items-center gap-2">
        <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center font-bold text-white shadow-lg shadow-blue-500/20">N</div>
        <h1 class="font-bold text-lg tracking-tight">NewmannScan</h1>
      </div>
      <button onclick="toggleTheme()" id="themeBtn" class="p-2 text-2xl active:scale-90 transition-transform">🌙</button>
    </header>

    <div class="text-center mb-10">
      <h2 class="text-5xl font-black tracking-tighter uppercase italic leading-none">Wallet Heritage</h2>
      <p class="text-gray-500 text-[10px] mt-3 tracking-[0.3em] uppercase font-bold opacity-60">Multi-Chain Reputation</p>
    </div>

    <div class="glass p-5 mb-8 shadow-xl">
      <input id="addrInp" type="text" placeholder="Paste ETH or SOL Address..." 
             class="w-full bg-transparent border-none outline-none text-sm font-mono mb-5 p-3 text-current">
      <button id="scanBtn" onclick="runScan()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold active:scale-95 transition-all text-white">
        ANALYZE REPUTATION
      </button>
    </div>

    <div id="resultArea" class="hidden glass p-7 border-t-4 border-blue-600 shadow-2xl"></div>
  </div>

  <script>
    const ETH_KEY = "VK3UV7J9MHTQE5A3EWTJDAXA1E182R2S9D";
    const SOL_KEY = "bb6fef44-5a36-42dc-ab51-9388651fa785";

    function toggleTheme() {
      const html = document.documentElement;
      const btn = document.getElementById('themeBtn');
      if (html.classList.contains('dark')) {
        html.classList.replace('dark', 'light');
        btn.innerText = '☀️';
      } else {
        html.classList.replace('light', 'dark');
        btn.innerText = '🌙';
      }
    }

    async function runScan() {
      const addr = document.getElementById('addrInp').value.trim();
      const area = document.getElementById('resultArea');
      const btn = document.getElementById('scanBtn');
      if(!addr) return;

      btn.disabled = true;
      area.classList.remove('hidden');
      area.innerHTML = `<div class="text-center py-6 animate-pulse text-blue-500 font-bold text-xs uppercase tracking-widest">Scanning Ledger...</div>`;

      try {
        if (addr.startsWith('0x')) {
          await scanEthereum(addr, area);
        } else {
          await scanSolana(addr, area);
        }
      } catch (err) {
        area.innerHTML = `<p class="text-red-500 text-center font-bold">SCAN ERROR</p>`;
      } finally {
        btn.disabled = false;
      }
    }

    async function scanEthereum(addr, area) {
      // 1. ENS Lookup
      let identity = addr.substring(0,6) + "..." + addr.substring(38);
      try {
        const ensRes = await fetch(`https://api.ensideas.com/ens/resolve/${addr}`);
        const ensData = await ensRes.json();
        if(ensData.displayName) identity = ensData.displayName;
      } catch(e) {}

      // 2. Transaction Scan
      const res = await fetch(`https://api.etherscan.io/api?module=account&action=txlist&address=${addr}&sort=asc&apikey=${ETH_KEY}`);
      const data = await res.json();

      if (data.status === "1" && data.result.length > 0) {
        const age = ((new Date() - new Date(data.result[0].timeStamp * 1000)) / 31536000000).toFixed(1);
        let gas = 0;
        data.result.slice(0, 100).forEach(tx => gas += (tx.gasUsed * tx.gasPrice / 1e18));
        
        let tier = gas > 1 ? "WHALE" : gas > 0.1 ? "SHARK" : age > 3.5 ? "OG" : "SHRIMP";
        render(area, "ETHEREUM", identity, tier, age, gas.toFixed(4) + " ETH");
      } else {
        render(area, "ETHEREUM", identity, "NEWBORN", "0.0", "0.00 ETH");
      }
    }

    async function scanSolana(addr, area) {
      const url = `https://mainnet.helius-rpc.com/?api-key=${SOL_KEY}`;
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jsonrpc: "2.0", id: "1", method: "getSignaturesForAddress", params: [addr, { limit: 1 }] })
      });
      const data = await res.json();

      if (data.result && data.result.length > 0) {
        render(area, "SOLANA", addr.substring(0,4) + "..." + addr.slice(-4), "SURVIVOR", "Active", "SVM Live");
      } else {
        render(area, "SOLANA", "Unknown", "NEWBORN", "0.0", "0.00 SOL");
      }
    }
